---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: gittargets.configbutler.ai
spec:
  group: configbutler.ai
  names:
    kind: GitTarget
    listKind: GitTargetList
    plural: gittargets
    singular: gittarget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.providerRef.name
      name: Provider
      type: string
    - jsonPath: .spec.branch
      name: Branch
      type: string
    - jsonPath: .spec.path
      name: Path
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: GitTarget is the Schema for the gittargets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GitTarget
            properties:
              branch:
                description: |-
                  Branch to use for this target.
                  Must be one of the allowed branches in the provider.
                  Immutable: delete and recreate the GitTarget to change its destination.
                type: string
              encryption:
                description: Encryption defines encryption settings for Secret resource
                  writes.
                properties:
                  age:
                    description: Age configures age-specific encryption behavior for
                      SOPS.
                    properties:
                      enabled:
                        default: false
                        description: Enabled toggles age-based recipient resolution
                          and bootstrap behavior.
                        type: boolean
                      recipients:
                        description: Recipients defines how recipients are resolved.
                        properties:
                          extractFromSecret:
                            default: false
                            description: ExtractFromSecret derives recipients from
                              all *.agekey entries in encryption.secretRef.
                            type: boolean
                          generateWhenMissing:
                            default: false
                            description: GenerateWhenMissing creates a date-named
                              *.agekey entry in encryption.secretRef when no *.agekey
                              exists.
                            type: boolean
                          publicKeys:
                            description: PublicKeys is a static list of age recipients
                              (age1...).
                            items:
                              type: string
                            type: array
                        type: object
                    type: object
                  provider:
                    default: sops
                    description: Provider selects the encryption provider.
                    enum:
                    - sops
                    type: string
                  secretRef:
                    description: SecretRef references namespace-local Secret data
                      used by the encryption provider.
                    properties:
                      group:
                        default: ""
                        description: Group of the referent.
                        type: string
                      kind:
                        default: Secret
                        description: Kind of the referent.
                        enum:
                        - Secret
                        type: string
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                required:
                - provider
                type: object
              path:
                description: |-
                  Path within the repository to write resources to, relative to the repository
                  root. Required and must be non-empty — there is no default, so a GitTarget can
                  never silently write to the repository root. To deliberately target the
                  repository root, set it to "." (the ArgoCD/Flux convention); an empty string is
                  rejected because it is too easy to leave blank by accident to be a deliberate
                  root choice. Any leading slash (absolute path) and ".." are rejected, and a
                  trailing slash is normalized away.
                  Immutable: delete and recreate the GitTarget to change its destination.
                minLength: 1
                type: string
              providerRef:
                description: |-
                  ProviderRef references the GitProvider that backs this target.
                  Immutable: delete and recreate the GitTarget to change its destination.
                properties:
                  group:
                    default: configbutler.ai
                    description: API Group of the referent.
                    type: string
                  kind:
                    default: GitProvider
                    description: |-
                      Kind of the referent.
                      Optional because this reference currently only supports a single kind (GitProvider).
                      Keeping it optional allows users to omit it while still benefiting from CRD defaulting.
                    enum:
                    - GitProvider
                    type: string
                  name:
                    description: Name of the referent.
                    type: string
                required:
                - name
                type: object
            required:
            - branch
            - path
            - providerRef
            type: object
            x-kubernetes-validations:
            - message: spec.providerRef is immutable; delete and recreate the GitTarget
                to change its destination
              rule: self.providerRef == oldSelf.providerRef
            - message: spec.branch is immutable; delete and recreate the GitTarget
                to change its destination
              rule: self.branch == oldSelf.branch
            - message: spec.path is immutable; delete and recreate the GitTarget to
                change its destination
              rule: self.path == oldSelf.path
          status:
            description: status defines the observed state of GitTarget
            properties:
              captureMode:
                description: |-
                  CaptureMode reflects the operator-level event capture mode active for this GitTarget.
                  Will be either "audit" or "watch".
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of an object's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastCommit:
                description: LastCommit is the SHA of the last commit processed.
                type: string
              lastPushTime:
                description: LastPushTime is the timestamp of the last successful
                  push.
                format: date-time
                type: string
              lastReconcileTime:
                description: LastReconcileTime is the timestamp of the most recent
                  reconcile attempt.
                format: date-time
                type: string
              materialization:
                description: |-
                  Materialization is a bounded roll-up of the demand-driven checkpoint state for the
                  resource types this GitTarget claims.
                properties:
                  claimedTypes:
                    description: ClaimedTypes is how many resource types this GitTarget
                      currently claims (demands).
                    format: int32
                    type: integer
                  failingTypes:
                    description: FailingTypes is how many claimed types last failed
                      their checkpoint sync.
                    format: int32
                    type: integer
                  notFollowableTypes:
                    description: |-
                      NotFollowableTypes is how many claimed types are not currently followable — the
                      claim-vs-refused mismatch an operator should notice.
                    format: int32
                    type: integer
                  observedTime:
                    description: ObservedTime is when this roll-up was last computed.
                    format: date-time
                    type: string
                  pendingTypes:
                    description: |-
                      PendingTypes is how many claimed types are still building their FIRST checkpoint and so are
                      not yet serviceable (Requested/Syncing). A type refreshing an existing checkpoint (Resyncing)
                      is NOT pending — it still serves the prior checkpoint and counts as Synced.
                    format: int32
                    type: integer
                  syncedTypes:
                    description: SyncedTypes is how many claimed types have a current
                      checkpoint and are serviceable.
                    format: int32
                    type: integer
                type: object
              observedGeneration:
                description: ObservedGeneration is the latest generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: |-
                  Phase is a small, derived, human-facing summary of the GitTarget's state —
                  purely a projection of the conditions (Pending / Initializing / Synced /
                  Degraded), informational only. Automation must gate on the conditions, never
                  on phase. See docs/design/status-design-git-target.md §3.3.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

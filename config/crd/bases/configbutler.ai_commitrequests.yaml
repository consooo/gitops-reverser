---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: commitrequests.configbutler.ai
spec:
  group: configbutler.ai
  names:
    kind: CommitRequest
    listKind: CommitRequestList
    plural: commitrequests
    singular: commitrequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.name
      name: GitTarget
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.reason
      name: Reason
      type: string
    - jsonPath: .status.branch
      name: Branch
      type: string
    - jsonPath: .status.sha
      name: SHA
      type: string
    - jsonPath: .spec.message
      name: Message
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          CommitRequest is a one-shot "save" signal: creating one finalizes the open
          commit window for the referenced GitTarget instead of waiting for the
          silence timer. The resulting commit SHA is reported back in status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of CommitRequest
            properties:
              delaySeconds:
                description: |-
                  DelaySeconds optionally holds the finalize for this many seconds after
                  the CommitRequest's creation, acting as an extra collect window:
                  changes the author makes in the meantime still join the open commit
                  window and are included in the finalized commit. Omitted or 0 finalizes
                  as soon as the CommitRequest is attributed to its author. The window
                  can still be closed earlier by another author's change or by the
                  provider's commit window timer, exactly as without a CommitRequest.
                format: int32
                maximum: 300
                minimum: 0
                type: integer
              message:
                description: |-
                  Message is an optional commit message for the finalized commit. When
                  omitted, the generated grouped-commit message is used.

                  When present it is limited to 1-1024 Unicode characters and used
                  verbatim as the commit message. Newlines are allowed so a subject and
                  body can be supplied; all other ASCII control characters (including tab
                  and carriage return) are rejected.
                maxLength: 1024
                minLength: 1
                pattern: ^[^\x00-\x09\x0B-\x1F\x7F]*$
                type: string
              targetRef:
                description: |-
                  TargetRef names the GitTarget whose open commit window to finalize.
                  The GitTarget must be in the same namespace as this CommitRequest.
                properties:
                  group:
                    default: configbutler.ai
                    description: API Group of the referent.
                    type: string
                  kind:
                    default: GitTarget
                    description: |-
                      Kind of the referent.
                      Optional because this reference currently only supports a single kind (GitTarget).
                      Keeping it optional allows users to omit it while still benefiting from CRD defaulting.
                    enum:
                    - GitTarget
                    type: string
                  name:
                    type: string
                required:
                - name
                type: object
            required:
            - targetRef
            type: object
            x-kubernetes-validations:
            - message: CommitRequest spec is immutable after creation
              rule: self == oldSelf
          status:
            description: status defines the observed state of CommitRequest
            properties:
              branch:
                description: Branch is the Git branch the commit landed on. Set when
                  Phase is Committed.
                type: string
              message:
                description: |-
                  Message is a human-readable detail for the terminal phase. When Phase is
                  Failed it carries the reason the finalize could not complete; when Phase is
                  Rejected it carries the prose for status.reason.
                type: string
              observedTime:
                description: ObservedTime is the timestamp at which the terminal phase
                  was recorded.
                format: date-time
                type: string
              phase:
                description: Phase is the lifecycle state of this CommitRequest.
                enum:
                - WaitingForAuditEvent
                - Committed
                - Rejected
                - Failed
                type: string
              reason:
                description: |-
                  Reason explains a Rejected phase: the machine-readable discriminator that
                  status consumers and tests assert on. Empty for non-Rejected phases.
                enum:
                - NoWindowInGrace
                - WindowMismatch
                - AlreadyPresent
                type: string
              sha:
                description: SHA is the resulting commit SHA. Set when Phase is Committed.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

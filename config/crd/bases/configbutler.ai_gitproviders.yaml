---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: gitproviders.configbutler.ai
spec:
  group: configbutler.ai
  names:
    kind: GitProvider
    listKind: GitProviderList
    plural: gitproviders
    singular: gitprovider
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GitProvider is the Schema for the gitproviders API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GitProvider
            properties:
              allowedBranches:
                description: AllowedBranches restricts which branches can be written
                  to.
                items:
                  type: string
                type: array
              commit:
                description: Commit configures commit identity, message formatting,
                  and signing behavior.
                properties:
                  committer:
                    description: |-
                      Committer configures the operator identity written as the commit committer.
                      When signing is enabled, Email must be a verified address on the account
                      that owns the signing key.
                    properties:
                      email:
                        default: noreply@configbutler.ai
                        description: Email is the git committer email.
                        type: string
                      name:
                        default: GitOps Reverser
                        description: Name is the git committer name.
                        type: string
                    type: object
                  message:
                    description: Message configures commit message formatting.
                    properties:
                      eventTemplate:
                        description: |-
                          EventTemplate is a Go text/template string for per-event commit messages
                          (used when commitWindow is "0s"; one event per commit).
                          Available variables: Operation, Group, Version, Resource, Namespace, Name,
                          APIVersion, Username, GitTarget.
                        type: string
                      groupTemplate:
                        description: |-
                          GroupTemplate is a Go text/template string for grouped commit messages
                          (the commit-window path; one commit per (author, gitTarget) group
                          produced by the batching pipeline).
                          Available variables: Author, GitTarget, Count, Operations (map of
                          CREATE/UPDATE/DELETE counts), Resources (slice of {Group, Version,
                          Resource, Namespace, Name}).
                        type: string
                      snapshotTemplate:
                        description: |-
                          SnapshotTemplate is a Go text/template string for atomic snapshot commit
                          messages (the initial-sync reconcile path; one commit covers the snapshot).
                          Available variables: Count, GitTarget.
                        type: string
                    type: object
                  signing:
                    description: Signing configures commit signing.
                    properties:
                      generateWhenMissing:
                        default: false
                        description: |-
                          GenerateWhenMissing causes the operator to generate signing key material
                          in the referenced Secret when it is missing.
                        type: boolean
                      secretRef:
                        description: |-
                          SecretRef references the Secret containing the signing key material.
                          Expected keys will be defined by the signing implementation.
                        properties:
                          group:
                            default: ""
                            description: Group of the referent.
                            type: string
                          kind:
                            default: Secret
                            description: Kind of the referent.
                            enum:
                            - Secret
                            type: string
                          name:
                            description: Name of the Secret.
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - secretRef
                    type: object
                type: object
              push:
                description: Push controls how events are coalesced into commits before
                  pushing.
                properties:
                  commitWindow:
                    description: |-
                      CommitWindow is the rolling silence window used to coalesce events into
                      a single commit per (author, gitTarget). The timer resets on every event
                      arrival and a flush is triggered after this many seconds of silence.
                      Setting "0s" opts into per-event commits in the steady-state.
                      Defaults to "5s".
                    type: string
                type: object
              secretRef:
                description: SecretRef for authentication credentials (may be nil
                  for public repos)
                properties:
                  group:
                    default: ""
                    description: Group of the referent.
                    type: string
                  kind:
                    default: Secret
                    description: Kind of the referent.
                    enum:
                    - Secret
                    type: string
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              url:
                description: URL of the repository (HTTP/SSH)
                type: string
            required:
            - allowedBranches
            - url
            type: object
          status:
            description: status defines the observed state of GitProvider
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the GitProvider resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              signingPublicKey:
                description: |-
                  SigningPublicKey is the operator's SSH signing public key in authorized_keys format.
                  Register this as a signing key on your git platform.
                  Only populated when commit.signing is configured and a signing key is available.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gitops-reverser.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
    app.kubernetes.io/part-of: gitops-reverser
    control-plane: gitops-reverser
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.deploymentStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "gitops-reverser.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "gitops-reverser.selectorLabels" . | nindent 8 }}
        control-plane: gitops-reverser
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gitops-reverser.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 20
      containers:
        - name: manager
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address={{ .Values.servers.metrics.bindAddress }}
            {{- if not .Values.servers.metrics.tls.enabled }}
            - --metrics-insecure
            {{- else }}
            - --metrics-cert-path={{ .Values.servers.metrics.tls.certPath }}
            - --metrics-cert-name={{ .Values.servers.metrics.tls.certName }}
            - --metrics-cert-key={{ .Values.servers.metrics.tls.certKey }}
            {{- end }}
            {{- if .Values.servers.audit.tls.enabled }}
            - --audit-cert-path={{ .Values.servers.audit.tls.certPath }}
            - --audit-cert-name={{ .Values.servers.audit.tls.certName }}
            - --audit-cert-key={{ .Values.servers.audit.tls.certKey }}
            - --audit-client-ca-path={{ .Values.servers.audit.tls.clientCAPath }}
            - --audit-client-ca-name={{ .Values.servers.audit.tls.clientCAName }}
            {{- else }}
            - --audit-insecure
            {{- end }}
            - --audit-listen-address={{ .Values.servers.audit.listenAddress }}
            - --audit-port={{ .Values.servers.audit.port }}
            - --audit-max-request-body-bytes={{ int64 .Values.servers.audit.maxRequestBodyBytes }}
            - --audit-read-timeout={{ .Values.servers.audit.timeouts.read }}
            - --audit-write-timeout={{ .Values.servers.audit.timeouts.write }}
            - --audit-idle-timeout={{ .Values.servers.audit.timeouts.idle }}
            - --audit-redis-addr={{ .Values.queue.redis.addr }}
            {{- with .Values.queue.redis.auth.username }}
            - --audit-redis-username={{ . | quote }}
            {{- end }}
            - --audit-redis-db={{ .Values.queue.redis.db }}
            - --audit-redis-stream={{ .Values.queue.redis.stream }}
            - --audit-redis-max-len={{ .Values.queue.redis.maxLen }}
            {{- if .Values.webhook.audit.debugStream.enabled }}
            - --audit-debug-redis-stream={{ .Values.webhook.audit.debugStream.stream }}
            - --audit-debug-redis-max-len={{ .Values.webhook.audit.debugStream.maxLen }}
            {{- end }}
            {{- if .Values.queue.redis.tls.enabled }}
            - --audit-redis-tls
            {{- end }}
            {{- with .Values.controllerManager.additionalSensitiveResources }}
            - {{ printf "--additional-sensitive-resources=%s" (join "," .) | quote }}
            {{- end }}
            - --audit-event-body-ttl={{ .Values.auditEventJoin.bodyTTL }}
            - --audit-event-decision-ttl={{ .Values.auditEventJoin.decisionTTL }}
            - --audit-event-body-wait={{ .Values.auditEventJoin.bodyWait }}
            - --capture-mode={{ .Values.captureMode }}
            - --watch-mode-reconcile-interval={{ .Values.watchModeReconcileInterval }}
            - --watch-mode-committer-name={{ .Values.watchModeCommitterName }}
            {{- if .Values.watchModeCommitterEmail }}
            - --watch-mode-committer-email={{ .Values.watchModeCommitterEmail }}
            {{- end }}
            {{- if .Values.logging.level }}
            - --zap-log-level={{ .Values.logging.level }}
            {{- end }}
            {{- if .Values.logging.development }}
            - --zap-development={{ .Values.logging.development }}
            {{- end }}
            {{- if .Values.logging.encoder }}
            - --zap-encoder={{ .Values.logging.encoder }}
            {{- end }}
            {{- if .Values.logging.stacktraceLevel }}
            - --zap-stacktrace-level={{ .Values.logging.stacktraceLevel }}
            {{- end }}
          ports:
            - name: audit
              containerPort: {{ .Values.servers.audit.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.servers.metrics.port }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.queue.redis.auth.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.queue.redis.auth.existingSecret }}
                  key: {{ .Values.queue.redis.auth.existingSecretKey | default "password" }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
            {{- if .Values.servers.metrics.tls.enabled }}
            - name: metrics-cert
              mountPath: {{ .Values.servers.metrics.tls.certPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.servers.audit.tls.enabled }}
            - name: audit-cert
              mountPath: {{ .Values.servers.audit.tls.certPath }}
              readOnly: true
            - name: audit-client-ca
              mountPath: {{ .Values.servers.audit.tls.clientCAPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp-dir
          emptyDir: {}
        {{- if .Values.servers.metrics.tls.enabled }}
        - name: metrics-cert
          secret:
            secretName: {{ .Values.servers.metrics.tls.secretNameOverride | default (printf "%s-metrics-server-cert" (include "gitops-reverser.fullname" .)) }}
            defaultMode: 420
        {{- end }}
        {{- if .Values.servers.audit.tls.enabled }}
        - name: audit-cert
          secret:
            secretName: {{ include "gitops-reverser.auditServerSecretName" . }}
            defaultMode: 420
        - name: audit-client-ca
          secret:
            secretName: {{ include "gitops-reverser.auditRootCASecretName" . }}
            defaultMode: 420
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
